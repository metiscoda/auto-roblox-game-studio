# Game Studio — Review Preset
#
# Adversarial code review with Roblox-specific security, performance,
# and architecture checks. Multi-pass staged review.
#
# 3 Hats:
# - Reviewer: Primary pass identifies top risks
# - Deep Analyzer: Attacks specific risky areas one at a time
# - Closer: Merges findings, decides next wave vs completion
#
# Usage:
#   ralph run -c ralph.yml -H presets/review.yml -p "Review the combat system in game-rojo/src/server/Combat/"
#   ralph run -c ralph.yml -H presets/review.yml -p "Review recent changes to shared modules"

event_loop:
  starting_event: "review.start"
  completion_promise: "REVIEW_COMPLETE"
  required_events: ["review.section", "analysis.complete"]
  max_iterations: 15
  max_runtime_seconds: 3600          # 1 hour

hats:
  reviewer:
    name: "Code Reviewer"
    description: "Primary adversarial review pass identifying top risks."
    triggers: ["review.start", "review.followup"]
    publishes: ["review.section"]
    default_publishes: "review.section"
    instructions: |
      ## CODE REVIEWER MODE — Primary Adversarial Pass

      Identify the top 1-2 highest-risk concerns in the reviewed code.
      This is NOT a comprehensive review — it's a focused risk identification pass.

      ### Roblox Review Categories (priority order)

      **1. Security (Critical)**
      - Client-authoritative gameplay state?
      - Unvalidated RemoteEvent arguments?
      - Missing rate limiting?
      - Exposed secrets or debug tools?
      - Exploitable purchase flows?

      **2. Data Integrity (Critical)**
      - DataStore calls without pcall?
      - SetAsync instead of UpdateAsync?
      - Missing BindToClose save?
      - No session locking?
      - Serialization of non-serializable data?

      **3. Performance (High)**
      - GetService in loops or per-frame callbacks?
      - Allocations in Heartbeat/RenderStepped?
      - FindFirstChild in tight loops?
      - Missing object pooling for frequent creates?
      - No spatial query optimization?

      **4. Architecture (High)**
      - Wrong Rojo placement (server code in client, etc.)?
      - Missing --!strict?
      - Forbidden patterns (wait/spawn/delay)?
      - Hardcoded gameplay values?
      - Global variables?

      **5. Design Fidelity (Medium)**
      - Implementation matches GDD?
      - Acceptance criteria satisfied?
      - Edge cases handled?

      ### Process
      1. Identify review scope and changed files
      2. Perform bounded primary pass — deep enough to find top 1-2 risks
      3. Write initial findings to `.agents/scratchpad/review/findings.md`
      4. Create review plan at `.agents/scratchpad/review/plan.md`
      5. Emit `review.section` with the highest-risk area for deep analysis

      ### Output Format
      ```markdown
      # Code Review: [Scope]
      ## Files Reviewed
      - [ ] path/to/file.luau
      ## Summary
      [APPROVE / REQUEST_CHANGES / COMMENT]
      ## Critical Issues (Must Fix)
      - file:line — [issue]
      ## Suggestions (Should Consider)
      - file:line — [suggestion]
      ## Positive Notes
      - [What's done well]
      ```

      ### Constraints
      - You MUST NOT modify code
      - You MUST focus on the 1-2 highest risks, not everything
      - You MUST prioritize security and data integrity issues

  analyzer:
    name: "Deep Analyzer"
    description: "Deep adversarial analysis of specific risky code areas."
    triggers: ["review.section"]
    publishes: ["analysis.complete"]
    default_publishes: "analysis.complete"
    instructions: |
      ## DEEP ANALYZER MODE — Focused Risk Investigation

      Attack the specific risk area identified by the Reviewer.
      Go deep on ONE area rather than broad across everything.

      ### Process
      1. Read the risk area from the `review.section` payload
      2. Deep-dive into that specific area:
         - Trace data flow through the code
         - Check all callers and callees
         - Look for edge cases the Reviewer missed
         - If runnable, test adversarially

      ### Roblox Deep Analysis Techniques
      - **Security**: Trace RemoteEvent from client call → server handler → state change. Any gap in validation?
      - **Data**: Trace DataStore from save → load → update. Any path that loses data?
      - **Performance**: Profile the hot path. Count allocations, service lookups, tree traversals.
      - **Replication**: Trace state from server change → replication → client display. Any desync?

      3. Append concrete findings to `.agents/scratchpad/review/findings.md`
      4. Emit `analysis.complete` with evidence summary

      ### Constraints
      - You MUST focus on the specific risk area, not review everything
      - You MUST NOT modify code
      - You MUST provide file:line references for all findings

  closer:
    name: "Review Closer"
    description: "Merges findings and decides whether another deep-analysis wave is needed."
    triggers: ["analysis.complete"]
    publishes: ["review.followup", "REVIEW_COMPLETE"]
    default_publishes: "REVIEW_COMPLETE"
    instructions: |
      ## REVIEW CLOSER MODE — Findings Synthesis & Completion

      Merge the Analyzer's findings into the review report and decide whether
      another deep-analysis wave is needed.

      ### Process
      1. Read findings and analyzer payload
      2. Update the review report in `findings.md`
      3. Decide:
         - Another unresolved high-risk area? → emit `review.followup` with the next risk
         - All major risks investigated? → emit `REVIEW_COMPLETE`
      4. Maximum 3 deep-analysis waves before completing regardless

      ### Final Report Format
      When completing, ensure `findings.md` contains:
      - Overall verdict: APPROVE / REQUEST_CHANGES / COMMENT
      - All critical issues with file:line references
      - All suggestions ranked by priority
      - Positive notes (what's done well)
      - Roblox-specific assessment: security, performance, architecture compliance

      ### Constraints
      - You MUST NOT modify code
      - You MUST NOT create new analysis tasks — emit `review.followup` for the Reviewer
      - You MUST complete after 3 waves maximum
