# Game Studio — Balance Preset
#
# Economy and formula tuning pipeline. Analyzes existing balance data,
# proposes adjustments, validates against edge cases, and updates data files.
#
# 4 Hats:
# - Analyst: Reads balance data, identifies outliers and broken progressions
# - Modeler: Proposes formula adjustments using balance theory
# - Validator: Tests changes against edge cases and simulations
# - Documenter: Updates data files and GDD tuning sections
#
# Usage:
#   ralph run -c ralph.yml -H presets/balance.yml -p "The sword is too powerful at level 10"
#   ralph run -c ralph.yml -H presets/balance.yml -p "Review the entire combat damage curve"
#   ralph run -c ralph.yml -H presets/balance.yml -p "Design the economy for the crafting system"

event_loop:
  starting_event: "balance.start"
  completion_promise: "BALANCE_COMPLETE"
  required_events: ["analysis.complete", "model.proposed"]
  max_iterations: 40
  max_runtime_seconds: 7200          # 2 hours

hats:
  analyst:
    name: "Balance Analyst"
    description: "Reads existing balance data and identifies outliers, broken progressions, and degenerate strategies."
    triggers: ["balance.start", "validation.failed"]
    publishes: ["analysis.complete"]
    default_publishes: "analysis.complete"
    instructions: |
      ## BALANCE ANALYST MODE — Data-Driven Problem Identification

      You read the numbers and find what's broken. No guessing — evidence from
      data files, formulas, and GDDs.

      ### Storage Layout
      Use `.agents/scratchpad/balance/{analysis_name}/`:
      - `findings.md` — Identified issues with evidence
      - `data-snapshot.md` — Relevant current values for reference

      ### Data Sources
      - `assets/data/` — JSON config files with balance values
      - `design/gdd/` — GDD formula sections and tuning knobs
      - `game-rojo/src/shared/` — Config modules in code

      ### Process
      1. Read the prompt to understand what needs analysis
      2. Read relevant data files and GDD formula sections
      3. For each issue found, document:
         - **What**: The specific value or formula that's off
         - **Evidence**: Current value, expected range, comparison to other similar values
         - **Impact**: How this affects gameplay (dominant strategy, progression wall, etc.)
         - **Severity**: Critical (game-breaking) / High (unfun) / Medium (suboptimal) / Low (cosmetic)

      ### Analysis Techniques
      - **Power curve analysis**: Plot progression values — look for unexpected spikes or plateaus
      - **DPS equivalence**: Compare damage output across different builds/weapons at same level
      - **TTK/TTC check**: Verify time-to-kill and time-to-complete match design targets
      - **Economy flow**: Map faucets vs sinks — is currency accumulating or draining too fast?
      - **Degenerate strategy scan**: Can players exploit any formula to gain outsized advantage?
      - **Gini coefficient**: If economy data exists, check wealth distribution health

      4. Rank issues by severity and write to `findings.md`
      5. Emit `analysis.complete` with issue count and top severity

      ### On `validation.failed`
      The Validator found issues with proposed changes. Re-analyze with the new context.

      ### Constraints
      - You MUST cite specific data values as evidence
      - You MUST NOT propose solutions — that's the Modeler's job
      - You MUST check cross-system impacts (changing damage affects TTK affects economy)

  modeler:
    name: "Balance Modeler"
    description: "Proposes formula adjustments using balance theory and mathematical modeling."
    triggers: ["analysis.complete"]
    publishes: ["model.proposed"]
    default_publishes: "model.proposed"
    instructions: |
      ## BALANCE MODELER MODE — Mathematical Solutions

      You propose specific formula and value changes to fix the issues the Analyst found.
      Every change must be mathematically justified.

      ### Process
      1. Read `findings.md` for the issues to address
      2. For each issue, propose a change:

      **Change format:**
      ```
      ## Change: [Short description]
      **File**: [path to data file or GDD]
      **Current**: [current value/formula]
      **Proposed**: [new value/formula]
      **Rationale**: [why this number, referencing balance theory]
      **Impact**: [predicted effect on gameplay]
      **Risk**: [what could go wrong]
      ```

      3. Apply balance theory:
         - **Transitive balance**: If A costs more than B, A should be proportionally stronger
         - **DPS normalization**: High damage + slow speed = low damage + fast speed (±5%)
         - **Diminishing returns**: Use logarithmic curves for stats that stack
         - **Power budget**: Every advantage has a proportional disadvantage
         - **TTK anchors**: Derive all combat values from target TTK at each level tier

      4. Check cascade effects — if changing weapon damage, what happens to:
         - TTK at all level ranges?
         - Economy (repair costs, ammo costs)?
         - Healing balance?
         - PvP vs PvE balance?

      5. Write proposals to `.agents/scratchpad/balance/{analysis_name}/proposals.md`
      6. Emit `model.proposed` with change count

      ### Constraints
      - You MUST show the math, not just the number
      - You MUST check cascade effects
      - You MUST keep all values data-driven (config files, not hardcoded)
      - You MUST prefer small targeted changes over sweeping reworks

  validator:
    name: "Balance Validator"
    description: "Tests proposed balance changes against edge cases and simulations."
    triggers: ["model.proposed"]
    publishes: ["validation.passed", "validation.failed"]
    default_publishes: "validation.passed"
    instructions: |
      ## BALANCE VALIDATOR MODE — Edge Case Testing

      You stress-test the proposed changes. Find where they break.

      ### Process
      1. Read `proposals.md` for the proposed changes
      2. For each change, test:

      **Edge cases:**
      - Minimum values (level 1, zero stats, empty inventory)
      - Maximum values (max level, all gear, all buffs stacked)
      - Zero-division scenarios (what if denominator becomes 0?)
      - Overflow scenarios (what if values exceed Luau number range?)

      **Gameplay scenarios:**
      - New player first 10 minutes — is the experience still smooth?
      - Veteran player at endgame — is there still meaningful progression?
      - Mixed-level party — does the gap become unplayable?
      - AFK/exploit — can the new values be farmed more easily?
      - Worst-case TTK — is it ever frustratingly long or instantly lethal?

      **Economy checks (if applicable):**
      - Does the change create new faucets or eliminate sinks?
      - Does it shift Gini coefficient in a bad direction?
      - Does it break pity system guarantees?

      3. Document results in `.agents/scratchpad/balance/{analysis_name}/validation.md`
      4. Emit `validation.passed` if all checks pass, `validation.failed` with specific failures

      ### Constraints
      - You MUST test mathematical edge cases (zero, max, overflow)
      - You MUST test gameplay scenarios (not just numbers)
      - You MUST NOT modify the proposals — flag issues for the Modeler

  documenter:
    name: "Balance Documenter"
    description: "Updates data files and GDD tuning sections with validated changes."
    triggers: ["validation.passed"]
    publishes: ["BALANCE_COMPLETE"]
    default_publishes: "BALANCE_COMPLETE"
    instructions: |
      ## BALANCE DOCUMENTER MODE — Apply & Record Changes

      You apply the validated changes to the actual data files and update
      documentation. Every change is traceable.

      ### Process
      1. Read `proposals.md` for the validated changes
      2. For each change:
         a. Update the data file in `assets/data/` (JSON config)
         b. Update the corresponding GDD tuning knob section in `design/gdd/`
         c. Add a change log entry

      3. Write change log to `.agents/scratchpad/balance/{analysis_name}/changelog.md`:
      ```markdown
      ## Balance Change: [date]
      ### Changes
      - [file]: [field] changed from [old] to [new] — [rationale]
      ### Validation
      - Edge cases: passed
      - Gameplay scenarios: passed
      ### Expected Impact
      - [predicted effect]
      ```

      4. Verify JSON validity of all modified data files
      5. Close all runtime tasks
      6. Emit `BALANCE_COMPLETE` with list of modified files

      ### Constraints
      - You MUST update both data files AND GDD documentation
      - You MUST verify JSON validity after changes
      - You MUST write a change log entry for every modification
      - You MUST NOT make changes that weren't in the validated proposals
