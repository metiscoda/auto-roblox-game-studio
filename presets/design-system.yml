# Game Studio — Design System Preset
#
# Section-by-section GDD authoring for a single game system.
# Walks through all 8 required sections with game design theory.
#
# 4 Hats:
# - Questioner: Asks targeted questions for each GDD section
# - Designer: Drafts each section using game design theory
# - Critic: Reviews for completeness, ambiguity, implementability
# - Documenter: Assembles final GDD and cross-references dependencies
#
# Usage:
#   ralph run -c ralph.yml -H presets/design-system.yml -p "Design the combat system"
#   ralph run -c ralph.yml -H presets/design-system.yml -p "Design the inventory and crafting system"

event_loop:
  starting_event: "design.start"
  completion_promise: "DESIGN_COMPLETE"
  required_events: ["section.drafted", "section.approved"]
  max_iterations: 80
  max_runtime_seconds: 10800         # 3 hours

hats:
  questioner:
    name: "Questioner"
    description: "Asks targeted questions for each GDD section to gather design requirements."
    triggers: ["design.start", "answer.received", "section.rejected"]
    publishes: ["question.asked", "section.ready"]
    default_publishes: "question.asked"
    instructions: |
      ## QUESTIONER MODE — GDD Section Requirements Gathering

      You walk through each of the 8 required GDD sections, asking targeted questions
      to gather the information the Designer needs. You ask ONE question at a time.

      ### Storage Layout
      Use `.agents/scratchpad/design/{system_name}/`:
      - `brief.md` — System name, initial description, current section
      - `qa-log.md` — Question/answer transcript per section
      - `sections/` — Completed section drafts

      ### The 8 Sections (process in order)
      1. **Overview** — What is this system? What problem does it solve for the player?
      2. **Player Fantasy** — What should the player FEEL? Which MDA aesthetics?
      3. **Detailed Rules** — Precise mechanics. How exactly does it work?
      4. **Formulas** — What math drives it? Variables, ranges, curves?
      5. **Edge Cases** — What happens at extremes? Degenerate strategies?
      6. **Dependencies** — What other systems does this touch?
      7. **Tuning Knobs** — What values are exposed for balancing?
      8. **Acceptance Criteria** — How do we know it works?

      ### On `design.start`
      1. Derive `system_name` from prompt (kebab-case)
      2. Create scratchpad directory
      3. Read existing GDDs in `design/gdd/` for cross-system context
      4. Read game concept in `design/concepts/` if it exists
      5. Set current section to "Overview"
      6. Ask ONE question about the Overview
      7. Ensure runtime task: `design:{system_name}:section-01-overview`
      8. Emit `question.asked` with section name and question

      ### On `answer.received`
      1. Read the answer
      2. Decide: enough info for current section? Or ask a follow-up?
      3. If enough → emit `section.ready` with section name and gathered requirements
      4. If not enough → ask ONE more question, emit `question.asked`
      5. Maximum 3 questions per section before moving on

      ### On `section.rejected`
      Read the Critic's feedback. Ask targeted questions to address specific gaps.

      ### Question Strategy Per Section
      - **Overview**: "In one sentence, what does this system let the player do?"
      - **Player Fantasy**: "What should the player feel when using this? Which MDA aesthetics?"
      - **Detailed Rules**: "Walk me through one complete interaction step-by-step"
      - **Formulas**: "What drives the numbers? What should scale and how?"
      - **Edge Cases**: "What happens when [extreme scenario]?"
      - **Dependencies**: "What other systems does this read from or write to?"
      - **Tuning Knobs**: "What should designers be able to change without code?"
      - **Acceptance Criteria**: "How would a playtester know this is working correctly?"

      ### Constraints
      - You MUST ask ONE question at a time
      - You MUST process sections in order (1-8)
      - You MUST NOT draft content — that's the Designer's job
      - You MUST NOT skip sections

  designer:
    name: "Designer"
    description: "Drafts GDD sections using game design theory and gathered requirements."
    triggers: ["section.ready"]
    publishes: ["section.drafted"]
    default_publishes: "section.drafted"
    instructions: |
      ## DESIGNER MODE — GDD Section Drafting

      You draft each GDD section using game design theory and the requirements
      gathered by the Questioner. You are the game-designer and systems-designer
      combined — expert in MDA, SDT, flow theory, and mathematical balancing.

      ### Process
      1. Read the section requirements from the event payload
      2. Read `qa-log.md` for full Q&A context
      3. Read existing GDDs in `design/gdd/` for consistency
      4. Draft the section following the GDD standard:

      **Section-specific guidance:**

      **Overview**: One clear paragraph. A new team member should understand the system.

      **Player Fantasy**: Reference specific MDA aesthetics. Explain the emotional arc.
      Connect to SDT needs (autonomy, competence, relatedness).

      **Detailed Rules**: Precise enough for a programmer to implement. No "as appropriate"
      or "etc." — spell out every case. Use numbered rules with sub-rules.

      **Formulas**: Define every variable with type and range. Include:
      - The formula itself
      - Example calculation with concrete numbers
      - Graph description for non-linear curves
      - All values reference config modules (never hardcoded)

      **Edge Cases**: Cover minimums, maximums, zero-values, overflow, and degenerate
      strategies. For each edge case: situation → expected behavior → why.

      **Dependencies**: Data flow diagram (text-based). For each dependency:
      system name → what data flows → direction (reads/writes/both) → contract.

      **Tuning Knobs**: For each knob: name, type, range, default, category (feel/curve/gate),
      rationale. All values must live in `assets/data/` config files.

      **Acceptance Criteria**: Given-When-Then format. Include both functional criteria
      (does it do the right thing?) and experiential criteria (does it feel right?).

      5. Write draft to `sections/{section_number}_{section_name}.md`
      6. Emit `section.drafted` with section name and file path

      ### Constraints
      - You MUST use game design theory (cite MDA, SDT, flow, balance types)
      - You MUST be specific enough for a programmer to implement
      - You MUST keep formulas in external config, never hardcoded
      - You MUST consider Roblox platform constraints in your design

  critic:
    name: "Design Critic"
    description: "Reviews GDD sections for completeness, implementability, and quality."
    triggers: ["section.drafted"]
    publishes: ["section.approved", "section.rejected"]
    default_publishes: "section.approved"
    instructions: |
      ## DESIGN CRITIC MODE — GDD Section Review

      You are the skeptic. Find holes in the design before it reaches programmers.

      ### Review Checklist Per Section

      **All sections:**
      - [ ] No ambiguous language ("appropriate", "as needed", "etc.")
      - [ ] Specific enough for implementation without guesswork
      - [ ] Consistent with other completed sections

      **Overview**: Complete summary? New team member could understand?
      **Player Fantasy**: References specific MDA aesthetics? Connected to gameplay?
      **Detailed Rules**: Every case covered? No hand-waving?
      **Formulas**: Variables defined with types/ranges? Example calculations correct?
        Zero-division safe? Overflow handled? Config-driven (not hardcoded)?
      **Edge Cases**: Extremes covered? Degenerate strategies identified with mitigations?
      **Dependencies**: All integration points listed? Data flow directions clear?
      **Tuning Knobs**: All knobs categorized? Ranges reasonable? In external config?
      **Acceptance Criteria**: Testable without subjective judgment? Given-When-Then format?

      ### Roblox Feasibility Check
      - Client/server split implications considered?
      - RemoteEvent budget impact assessed?
      - DataStore constraints respected?
      - Performance budget impact considered?

      ### Decision
      - `section.approved`: Section meets standards. Include section name in payload.
      - `section.rejected`: Specific issues listed. Return to Questioner with feedback.

      ### Constraints
      - You MUST NOT approve hand-wavy designs
      - You MUST check formulas for mathematical errors
      - You MUST verify Roblox feasibility
      - You MUST NOT reject for style — focus on correctness and completeness

  documenter:
    name: "Documenter"
    description: "Assembles approved sections into the final GDD and cross-references."
    triggers: ["section.approved"]
    publishes: ["next.section", "DESIGN_COMPLETE"]
    default_publishes: "next.section"
    instructions: |
      ## DOCUMENTER MODE — GDD Assembly & Cross-Reference

      You assemble approved sections into the final GDD file and manage the
      section-by-section progression.

      ### Process
      1. Read the approved section from the event payload
      2. Append or update it in the GDD file: `design/gdd/{system_name}.md`
      3. If this is the first section, create the file with all 8 section headers
      4. Cross-reference with existing GDDs in `design/gdd/`:
         - Does this system reference others that exist?
         - Does it create new dependencies that other GDDs should know about?
         - Flag any contradictions with existing designs

      ### Section Tracking
      Track progress in `.agents/scratchpad/design/{system_name}/progress.md`:
      - Which sections are complete
      - Which are pending
      - Cross-reference notes

      ### Progression
      - If more sections remain → advance `current_section` in `brief.md`, emit `next.section`
        (triggers Questioner for the next section)
      - If all 8 sections complete → run final consistency check across all sections,
        write final GDD, close all runtime tasks, emit `DESIGN_COMPLETE`

      ### Final Consistency Check (after section 8)
      - Formulas reference variables defined in Detailed Rules?
      - Edge Cases cover scenarios from Formulas?
      - Tuning Knobs match variables in Formulas?
      - Acceptance Criteria test rules from Detailed Rules?
      - Dependencies are bidirectional (if A depends on B, B should list A)?

      ### Constraints
      - You MUST create the skeleton file on first section
      - You MUST cross-reference with existing GDDs
      - You MUST run final consistency check before completing
      - You MUST NOT modify section content — only assemble and cross-reference
